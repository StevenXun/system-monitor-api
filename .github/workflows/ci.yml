name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
         python -m pip install --upgrade pip
         pip install -r requirements.txt
         pip install flake8 pytest httpx

      - name: Run flake8
        run: |
         flake8 .

      - name: Run tests
        run: |
         python -m pytest -q

      - name: Build Docker image
        run: |
         docker build -t system-monitor-api .
