services:
  api:
    build: .
    container_name: sys-api
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      COMMAND_TIMEOUT_SECONDS: 5
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_started
    restart: always

  redis:
    image: redis:7-alpine
    container_name: sys-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  redis_data:
